name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
    
    - name: Download Gradle Wrapper if missing
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          mkdir -p gradle/wrapper
          curl -L https://services.gradle.org/distributions/gradle-8.0-bin.zip -o gradle-8.0.zip
          unzip -q gradle-8.0.zip
          cp gradle-8.0/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/
          rm -rf gradle-8.0 gradle-8.0.zip
        fi
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Display Gradle version
      run: ./gradlew --version
    
    - name: Clean build
      run: ./gradlew clean
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
      continue-on-error: true
    
    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          build/
          app/build/
        retention-days: 7
