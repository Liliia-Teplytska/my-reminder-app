name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
    
    - name: Download and setup Gradle Wrapper
      run: |
        echo "Setting up Gradle Wrapper..."
        mkdir -p gradle/wrapper
        
        # Скачиваем Gradle 8.0
        echo "Downloading Gradle 8.0..."
        curl -L https://services.gradle.org/distributions/gradle-8.0-bin.zip -o /tmp/gradle-8.0.zip
        
        # Распаковываем
        echo "Extracting Gradle..."
        unzip -q /tmp/gradle-8.0.zip -d /tmp/
        
        # Копируем ГЛАВНЫЙ JAR файл из lib/plugins/
        echo "Copying gradle-wrapper.jar from lib/plugins/..."
        cp /tmp/gradle-8.0/lib/plugins/gradle-wrapper-8.0.jar gradle/wrapper/gradle-wrapper.jar
        
        # Создаём properties файл
        echo "Creating gradle-wrapper.properties..."
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
        
        # Проверяем размер
        echo "✅ File size:"
        ls -lh gradle/wrapper/gradle-wrapper.jar
        
        # Проверяем тип файла
        echo "✅ File type:"
        file gradle/wrapper/gradle-wrapper.jar
        
        # Очистка
        rm -rf /tmp/gradle-8.0 /tmp/gradle-8.0.zip
        
        echo "✅ Gradle Wrapper setup complete"
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Display Gradle version
      run: ./gradlew --version
    
    - name: Clean build
      run: ./gradlew clean
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
      continue-on-error: true
    
    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          build/
          app/build/
        retention-days: 7
