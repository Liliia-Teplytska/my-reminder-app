name: Check Gradle Archive Structure

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Download Gradle 8.0
      run: |
        curl -L https://services.gradle.org/distributions/gradle-8.0-bin.zip -o /tmp/gradle-8.0.zip
        unzip -q /tmp/gradle-8.0.zip -d /tmp/
        
        echo "=== Full directory structure ==="
        find /tmp/gradle-8.0 -name "*wrapper*" -type f
        
        echo ""
        echo "=== All JAR files ==="
        find /tmp/gradle-8.0 -name "*.jar" | head -20
        
        echo ""
        echo "=== Contents of lib/ ==="
        ls -lh /tmp/gradle-8.0/lib/
        
        echo ""
        echo "=== Contents of lib/plugins/ ==="
        ls -lh /tmp/gradle-8.0/lib/plugins/
